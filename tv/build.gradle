plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'

    // This MUST match the Kotlin version in the top-level file (2.1.0)
    id 'org.jetbrains.kotlin.plugin.compose' version '2.1.0'

    id 'com.google.gms.google-services'

    // This MUST match the Kotlin version (2.1.0)
    id 'org.jetbrains.kotlin.plugin.serialization' version '2.1.0'

    id 'com.google.dagger.hilt.android' // Version is handled by top-level
    id 'kotlin-kapt'
    id 'kotlin-parcelize'
}

def versionMajor = 1
def versionMinor = 1
def versionPatch = 1
def buildType="beta"

android {
    namespace 'com.example.sanchitra'
    compileSdk 36

    defaultConfig {
        applicationId "com.example.sanchitra"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionCode versionMajor * 10000
        + versionMinor * 100
        + versionPatch
        versionName "${versionMajor}.${versionMinor}.${versionPatch}-${buildType}"
        multiDexEnabled true // add this to enable multi-dex
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    }
    lint {
        disable "NullSafeMutableLiveData"
        abortOnError false
        checkReleaseBuilds false
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
            resValue "string", "app_version", "${defaultConfig.versionName}"
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        buildConfig true
        dataBinding true
        viewBinding true
        compose true
    }

}

dependencies {
    // --- 1. Hilt Dependency Injection ---
    implementation "com.google.dagger:hilt-android:2.55"
    implementation 'androidx.compose.foundation:foundation-layout:1.10.5'
    implementation 'androidx.compose.animation:animation:1.10.5'
    implementation 'androidx.compose.animation:animation-core:1.10.5'
    implementation 'androidx.compose.ui:ui-geometry:1.10.6'
    implementation 'androidx.compose.runtime:runtime:1.10.6'
    implementation 'androidx.compose.foundation:foundation-layout:1.10.6'
    implementation 'androidx.compose.ui:ui:1.10.6'
    implementation 'androidx.compose.foundation:foundation:1.10.6'
    kapt "com.google.dagger:hilt-android-compiler:2.55"
    implementation "androidx.hilt:hilt-navigation-compose:1.2.0"

    // --- 2. Jetpack Compose (BOM manages versions) ---
    def composeBom = platform('androidx.compose:compose-bom:2024.12.01')
    implementation composeBom
    implementation 'androidx.compose.ui:ui'
    implementation 'androidx.compose.ui:ui-graphics'
    implementation 'androidx.compose.ui:ui-tooling-preview'
    implementation 'androidx.compose.material3:material3'
    implementation "androidx.compose.material:material-icons-extended"
    implementation "androidx.compose.foundation:foundation"
    implementation "androidx.compose.ui:ui-viewbinding"
    debugImplementation 'androidx.compose.ui:ui-tooling'

    // --- 3. Activity, Fragment & Lifecycle (Stable Versions) ---
    // Using 1.9.3 to avoid the AGP 8.9.1 requirement error
    implementation "androidx.activity:activity-compose:1.9.3"
    implementation "androidx.lifecycle:lifecycle-viewmodel-compose:2.8.7"
    implementation "androidx.lifecycle:lifecycle-runtime-compose:2.8.7"
    implementation "androidx.fragment:fragment-ktx:1.8.5"
    implementation "androidx.core:core-ktx:1.15.0"
    implementation "androidx.core:core-splashscreen:1.0.1"

    // --- 4. TV Specific (Standardized to RC-02) ---
    implementation "androidx.tv:tv-foundation:1.0.0-alpha11"
    implementation "androidx.tv:tv-material:1.0.0-rc02"
    implementation 'androidx.leanback:leanback:1.2.0'
    implementation "androidx.leanback:leanback-tab:1.1.0"

    // --- 5. Networking & Serialization ---
    implementation 'com.squareup.retrofit2:retrofit:2.11.0'
    implementation 'com.squareup.retrofit2:converter-gson:2.11.0'
    implementation 'com.squareup.okhttp3:okhttp-urlconnection:4.12.0'
    implementation "org.jetbrains.kotlinx:kotlinx-serialization-json:1.7.3"

    // --- 6. Media & Video Players ---
    def media3_version = "1.6.0"
    implementation "androidx.media3:media3-exoplayer:$media3_version"
    implementation "androidx.media3:media3-exoplayer-dash:$media3_version"
    implementation "androidx.media3:media3-exoplayer-hls:$media3_version"
    implementation "androidx.media3:media3-ui:$media3_version"
    implementation "androidx.media3:media3-ui-compose:$media3_version" // This contains the state classes
    implementation "androidx.media3:media3-common:$media3_version"

    // Legacy ExoPlayer (If your code specifically requires 2.19)
    implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
    implementation 'com.google.android.exoplayer:extension-leanback:2.19.1'
    implementation "org.videolan.android:libvlc-all:3.5.1"

    // --- 7. Image Loading & UI Utilities ---
    implementation("io.coil-kt:coil-compose:2.7.0")
    implementation 'com.github.bumptech.glide:glide:5.0.5'
    annotationProcessor 'com.github.bumptech.glide:compiler:5.0.5'
    implementation "androidx.palette:palette-ktx:1.0.0"

    // --- 8. Firebase, Ads & Google Services ---
    implementation platform('com.google.firebase:firebase-bom:34.11.0')
    implementation 'com.google.firebase:firebase-analytics'
    implementation "com.google.android.gms:play-services-ads:23.6.0"
    implementation 'com.google.android.material:material:1.12.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.2.0'
    implementation 'androidx.appcompat:appcompat:1.7.1'

    // --- 9. Machine Learning / Edge ---
    implementation 'com.google.ai.edge.litert:litert-metadata:1.4.2'

    // --- 10. for qr code
    implementation "com.google.zxing:core:3.5.4"
    implementation "com.github.alexzhirkevich:custom-qr-generator:1.6.0"
}